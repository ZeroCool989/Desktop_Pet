appId: com.almir.panther
productName: Panther
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - '**/*.node'
extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*.glb'
      - '**/*.png'
npmRebuild: true
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.png
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
